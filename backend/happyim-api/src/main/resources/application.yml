spring:
  profiles:
    active: dev

  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB

  datasource:
    url: jdbc:mysql://localhost:3308/happyim?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6380
    mongodb:
      uri: mongodb://localhost:27019/happyim

  mail:
    host: smtp.qq.com
    port: 465
    username: ${SMTP_USERNAME:your-email@qq.com}
    password: ${SMTP_PASSWORD:your-smtp-auth-code}
    default-encoding: UTF-8
    properties:
      mail.smtp.auth: true
      mail.smtp.ssl.enable: true
      mail.smtp.socketFactory.port: 465
      mail.smtp.socketFactory.class: javax.net.ssl.SSLSocketFactory



  rabbitmq:
    host: localhost
    port: 5673
    username: guest
    password: guest

happyim:
  mq:
    exchange: chat.exchange
    queue: chat:ws:ws-1
    routing-key: ws.ws-1

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.happyim.common.model.entity
  configuration:
    map-underscore-to-camel-case: true

minio:
  endpoint: http://localhost:9002
  access-key: minioadmin
  secret-key: minioadmin
  bucket: happyim

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:change-me-to-a-random-secret-at-least-256-bits}
  access-token-expire: 900
  refresh-token-expire: 604800

logging:
  level:
    root: INFO
    com.happyim: DEBUG
