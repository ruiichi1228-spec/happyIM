spring:
  profiles:
    active: dev

  cloud:
    nacos:
      config:
        import-check:
          enabled: false

  datasource:
    url: jdbc:mysql://localhost:3308/happyim?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6380
    mongodb:
      uri: mongodb://localhost:27019/happyim

  rabbitmq:
    host: localhost
    port: 5673
    username: guest
    password: guest

happyim:
  mq:
    exchange: chat.exchange
    queue: chat:ws:ws-1
    routing-key: ws.ws-1

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

minio:
  endpoint: http://localhost:9002
  access-key: minioadmin
  secret-key: minioadmin
  bucket: happyim

server:
  port: 8081

jwt:
  secret: ${JWT_SECRET:change-me-to-a-random-secret-at-least-256-bits}
  access-token-expire: 900
  refresh-token-expire: 604800

logging:
  level:
    root: INFO
    com.happyim: DEBUG
