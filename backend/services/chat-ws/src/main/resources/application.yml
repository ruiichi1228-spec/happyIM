spring:
  config:
    import: nacos:happyim-common.yaml
  profiles:
    active: dev

  cloud:
    nacos:
      config:
        server-addr: localhost:8848

  data:
    redis:
      host: localhost
      port: 6380

  rabbitmq:
    host: localhost
    port: 5673
    username: guest
    password: guest

happyim:
  mq:
    exchange: happyim.exchange
    queue: chat:ws:ws-1
    routing-key: chat.message

server:
  port: 8081

jwt:
  secret: ${JWT_SECRET:change-me-to-a-random-secret-at-least-256-bits}
  access-token-expire: 900
  refresh-token-expire: 604800

logging:
  level:
    root: INFO
    com.happyim: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
