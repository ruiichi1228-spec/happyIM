server:
  port: 8101

spring:
  config:
    import: nacos:happyim-common.yaml
  profiles:
    active: dev
  application:
    name: user-service
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        ip: 127.0.0.1
      config:
        server-addr: localhost:8848
  data:
    redis:
      host: localhost
      port: 6380
    mongodb:
      uri: mongodb://localhost:27019/happyim
  rabbitmq:
    host: localhost
    port: 5673
    username: guest
    password: guest
  mail:
    host: smtp.qq.com
    port: 465
    username: ${SMTP_USERNAME:your-email@qq.com}
    password: ${SMTP_PASSWORD:your-smtp-auth-code}
    default-encoding: UTF-8
    properties:
      mail.smtp.auth: true
      mail.smtp.ssl.enable: true
  datasource:
    url: jdbc:mysql://localhost:3308/happyim?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: ${JWT_SECRET:change-me-to-a-random-secret-at-least-256-bits}
  access-token-expire: 900
  refresh-token-expire: 604800

happyim:
  mq:
    exchange: happyim.exchange
    routing-key: system.message

# Not used by user-service but required by common's MinioConfig
minio:
  endpoint: http://localhost:9002
  access-key: minioadmin
  secret-key: minioadmin
  bucket: happyim

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
