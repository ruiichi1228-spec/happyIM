server:
  port: 8080
  address: 0.0.0.0

spring:
  config:
    import: nacos:happyim-common.yaml
  profiles:
    active: dev
  application:
    name: happyim-gateway
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        ip: 127.0.0.1
      config:
        server-addr: localhost:8848
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # user-service
        - id: user-auth
          uri: lb://user-service
          predicates: Path=/api/auth/**
        - id: user-users
          uri: lb://user-service
          predicates: Path=/api/users/**
        - id: user-friends
          uri: lb://user-service
          predicates: Path=/api/friends/**
        - id: user-groups
          uri: lb://user-service
          predicates: Path=/api/groups/**
        - id: user-admin
          uri: lb://user-service
          predicates: Path=/api/admin/**
        # chat-service
        - id: chat-conversations
          uri: lb://chat-service
          predicates: Path=/api/conversations/**
        # content-service
        - id: content-moments
          uri: lb://content-service
          predicates: Path=/api/moments/**
        - id: content-square
          uri: lb://content-service
          predicates: Path=/api/square/**
        - id: content-files
          uri: lb://content-service
          predicates: Path=/api/files/**
        - id: content-file-feed
          uri: lb://content-service
          predicates: Path=/api/file-feed/**
        # chat-ws (WebSocket)
        - id: chat-ws
          uri: http://localhost:8081
          predicates: Path=/ws/**

  # Sentinel 控制台（可选）
  # sentinel:
  #   transport:
  #     dashboard: localhost:8088

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

jwt:
  secret: ${JWT_SECRET:change-me-to-a-random-secret-at-least-256-bits}
  access-token-expire: 900
  refresh-token-expire: 604800
